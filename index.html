<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SAM. – Torque Spec Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#05060a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="SAM." />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

  <style>
    :root{
      --bg:#05060a;
      --panel:#0b0d14;
      --panel2:#070813;
      --border:#343846;
      --border-soft:rgba(255,255,255,.12);
      --border-muted:rgba(255,255,255,.09);
      --text:#f5f5f7;
      --sub:#a5a7b3;
      --muted:#6f7380;
      --accent:#4f8cff;
      --accent2:#9fddff;
      --danger:#ff4f6a;
      --ok:#27e49f;
      --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
      background:radial-gradient(circle at top,#141622 0,#05060a 55%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:stretch;
    }
    .wrap{
      width:100%;
      max-width:760px;
      padding:18px 14px 24px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    header{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:8px;
    }
    .brandText .t1{
      font-weight:800;letter-spacing:.04em;font-size:16px;
      text-transform:uppercase;color:var(--text);
      line-height:1.1;
    }
    .brandText .t2{
      font-size:11px;color:var(--sub);
      line-height:1.1;margin-top:2px;
    }
    .badge{
      padding:7px 10px;border-radius:999px;
      border:1px solid var(--border);
      font-size:12px;line-height:1.1;color:var(--sub);
      background:rgba(12,14,22,.9);
      display:inline-flex;align-items:center;gap:7px;
      white-space:nowrap;
    }
    .dot{width:6px;height:6px;border-radius:999px;background:var(--ok);box-shadow:0 0 10px rgba(39,228,159,.7)}

    .card{
      background:linear-gradient(145deg,var(--panel),var(--panel2));
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:14px;
      position:relative;
      overflow:hidden;
      box-shadow:0 18px 45px rgba(0,0,0,.6);
    }
    .card::before{
      content:"";
      position:absolute;inset:-40%;
      background:radial-gradient(circle at top left,rgba(79,140,255,.12),transparent 60%);
      pointer-events:none;
      opacity:.9;
    }
    .card > *{position:relative;z-index:1}

    .inputCard{
      padding:22px 20px 18px;
      min-height:178px;
      border-color:#454b5e;
      box-shadow:0 18px 45px rgba(0,0,0,.6), 0 0 0 1px rgba(79,140,255,.08) inset;
    }

    /* Input center */
    .voiceArea{
      display:flex;
      flex-direction:column;
      gap:14px;
      align-items:stretch;
      text-align:left;
      padding:0;
    }

    .fallbackRow{
      width:100%;
      display:flex;
      gap:8px;
      align-items:stretch;
    }

    .micBig{
      min-width:0;
      height:42px;
      width:42px;
      padding:0;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(9,11,18,.85);
      color:var(--text);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;
      transition:transform .08s ease, box-shadow .08s ease, opacity .12s ease;
    }
    .micBig:hover{border-color:rgba(79,140,255,.6)}
    .micBig:active{transform:scale(.97)}

    /* Secondary actions (Voice + Photo) */
    .primaryActions{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      width:100%;
      flex-wrap:wrap;
    }
    .camBig{
      min-width:0;
      height:42px;
      width:42px;
      padding:0;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(9,11,18,.85);
      color:var(--text);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;
      transition:transform .08s ease, box-shadow .12s ease, border-color .12s ease;
    }
    .camBig:hover{border-color:rgba(79,140,255,.6)}
    .camBig:active{transform:scale(.97)}
    .camBig svg{width:20px;height:20px}

    .photoPane{
      width:100%;
      margin-top:6px;
      display:none;
      flex-direction:column;
      gap:10px;
      align-items:center;
    }
    .photoPane.isOpen{display:flex}
    .photoPreview{
      width:100%;
      max-height:240px;
      object-fit:cover;
      border-radius:18px;
      border:1px solid var(--border);
      background:rgba(9,11,18,.6);
    }
    .photoActions{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
    }
    .photoAnalyzeBtn{
      min-width:104px;
      border-color:rgba(79,140,255,.75);
      background:var(--accent) !important;
      color:#05060a !important;
    }
    .photoAnalyzeBtn:hover{
      filter:brightness(1.08);
    }
    .photoAnalyzeBtn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .micBig[disabled]{opacity:.35;cursor:not-allowed;box-shadow:none}
    .micBig svg{width:20px;height:20px}
    .hint{
      font-size:12px;color:var(--sub);
      line-height:1.35;
      text-align:center;
    }
    .hint b{color:#c2d5ff}
    .status{
      min-height:16px;
      line-height:1.25;
      font-size:12px;
      color:var(--sub);
      text-align:center;
      overflow:hidden;
      white-space:pre-line;
      width:100%;
    }
    .status.active{color:#c2d5ff}
    .status.error{color:var(--danger)}

    .q{
      flex:1;
      border-radius:999px;
      border:1px solid #5a6278;
      background:rgba(34,38,53,.96);
      padding:0 15px;
      color:var(--text);
      font-size:16px;
      outline:none;
      min-width:0;
      height:50px;
    }
    .q:focus{border-color:rgba(79,140,255,.7);box-shadow:0 0 0 3px rgba(79,140,255,.12)}
    .q::placeholder{color:#c2c8d6}
    .send{
      width:50px;
      min-width:50px;
      border-radius:999px;
      border:1px solid var(--border);
      background:var(--accent);
      color:#05060a;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:transform .08s ease, filter .12s ease;
    }
    .send:hover{filter:brightness(1.08)}
    .send:active{transform:scale(.98)}
    .send svg{width:19px;height:19px}

    /* step list shown in the headline area (no top divider) */
    .stepList.inline{
      margin-top: 8px;
      padding-top: 0;
      border-top: none;
    }

    /* Result card */
    .resultTop{
      display:flex;
      justify-content:stretch;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }
    .controls{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      width:100%;
    }
    .controlGroup{
      display:flex;
      gap:8px;
      align-items:center;
      padding-right:10px;
      border-right:1px solid var(--border-soft);
    }
    .pillBtn{
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(9,11,18,.85);
      color:var(--text);
      font-size:11px;
      cursor:pointer;
    }
    .pillBtn:hover{border-color:rgba(79,140,255,.6)}
    .pillBtn:active{transform:scale(.99)}
    .pillBtn[disabled]{opacity:.35;cursor:not-allowed}
    .iconBtn{
      width:34px;
      height:34px;
      padding:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .iconBtn svg{
      width:16px;
      height:16px;
    }
    .controls .iconBtn:not(.voiceReadToggle):not(.clearBtn):hover{
      border-color:var(--border);
    }
    .controls .iconBtn:not(.voiceReadToggle):not(.clearBtn):not([disabled]):active{
      border-color:rgba(79,140,255,.6);
    }
    .controls .iconBtn:not(.voiceReadToggle):not(.clearBtn).isPressed{
      border-color:rgba(79,140,255,.6);
    }
    .clearBtn{
      margin-left:auto;
    }
    .clearBtn:hover{
      border-color:var(--border);
    }
    .controls .iconBtn.clearBtn:not([disabled]):active{
      border-color:rgba(255,79,106,.55);
    }
    .controls .iconBtn.clearBtn.isPressed{
      border-color:rgba(255,79,106,.55);
    }
    .voiceReadToggle{
      border-color:var(--border);
      color:var(--sub);
    }
    .voiceReadToggle:hover{
      border-color:#4b5061;
    }
    .voiceReadToggle .audioIconOn{
      display:none;
    }
    .voiceReadToggle .audioIconOff{
      display:block;
    }
    .voiceReadToggle.on{
      border-color:rgba(39,228,159,.55);
      color:#d9fff1;
      box-shadow:0 0 0 2px rgba(39,228,159,.10) inset;
    }
    .voiceReadToggle.on:hover{
      border-color:rgba(39,228,159,.72);
    }
    .voiceReadToggle.on .audioIconOn{
      display:block;
    }
    .voiceReadToggle.on .audioIconOff{
      display:none;
    }

    .partName{
      font-size:16px;
      font-weight:700;
      line-height:1.2;
      margin:2px 0 8px;
    }
    .torqueBig{
      font-size:30px;
      font-weight:800;
      letter-spacing:-.02em;
      line-height:1;
      margin:0 0 8px;
    }
    .torqueUnit{
      font-size:14px;
      font-weight:700;
      color:#c2d5ff;
      margin-left:6px;
    }
    .subLine{
      font-size:12px;
      color:var(--sub);
      line-height:1.4;
      margin-top:2px;
    }
    .emptyLine{
      font-size:13px;
    }
    .metaRow{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:10px;
    }
    .meta{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:4px 9px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(9,11,18,.85);
      font-size:10px;
      color:var(--sub);
    }
    .meta .mDot{width:6px;height:6px;border-radius:999px;background:var(--accent)}
    .notes{
      margin-top:10px;
      padding-top:10px;
      border-top:1px solid var(--border-muted);
      display:flex;
      flex-direction:column;
      gap:6px;
    }
   .note{
      margin-top:6px;            /* 정보와의 간격 살짝 줄임 */
      font-size:12px;
      opacity:.75;
      display:flex;
      justify-content:flex-end;  /* 오른쪽 정렬 */
      align-items:flex-start;
      gap:6px;                   /* ⓘ 와 텍스트 간격 */
    }
    .note .icon{
      font-size:12px;            /* 텍스트와 동일 */
      line-height:1.35;
    }
    .note .text{
      line-height:1.35;
      max-width:100%;
    }
    .empty{
      font-size:13px;
      color:#888b96;
      line-height:1.4;
    }

    /* Chemistry line (threadlock/lube/sealant) */
    .chemLine{
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 14px;
      border: 1px solid var(--border-muted);
      background: rgba(255,255,255,.035);
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .chemItem{
      font-size: 12px;
      color: var(--sub);
      line-height: 1.25;
    }
    .chemKey{
      font-weight: 700;
      letter-spacing: .02em;
      color: #d7d8df;
    }

    /* Multi-step list: all same size */
    .stepList{
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-muted);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .stepRow{
      display: flex;
      gap: 10px;
      align-items: baseline;
      padding: 8px 10px;
      border-radius: 14px;
      border: 1px solid var(--border-muted);
      background: rgba(7,9,16,.55);
    }
    .stepTag{
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #c2d5ff;
    }
    .stepVal{
      flex: 1 1 auto;
      font-size: 16px;        /* <= 모든 step 동일 크기 */
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.15;
      display:flex;
      align-items:baseline;
      gap:6px;
    }
    /* Multi-step: one container with row dividers */
    .stepList.multi{
      padding:4px 0;
      border:1px solid var(--border-muted);
      border-radius:14px;
      background:rgba(255,255,255,.035);
      gap:0;
      overflow:hidden;
    }
    .stepList.multi .stepRow{
      border:0;
      border-radius:0;
      background:transparent;
      padding:9px 11px;
    }
    .stepList.multi .stepRow + .stepRow{
      border-top:0;
    }
    .stepList.multi .stepVal{
      font-size: 20px;   /* 기존 16px → 살짝 키움 */
      font-weight: 900;  /* 가독성 강화 (선택) */
    }

    .stepNum{
      font-size:24px;
      font-weight:800;
      letter-spacing:-.02em;
      line-height:1;
    }
    .stepUnit{
      font-size:14px;
      font-weight:700;
      color:#c2d5ff;
    }


    .moreInfoBar{
      margin-top:10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--border-soft);
      background:rgba(7,9,16,.55);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .moreInfoText{font-size:12px;color:#d7d8df;line-height:1.25}
    .moreInfoBtns{display:flex;gap:8px}
    .moreBtn{
      padding:7px 10px;border-radius:999px;
      border:1px solid var(--border);
      background:rgba(9,11,18,.85);
      color:var(--text);
      font-size:11px;
      cursor:pointer;
    }
    .moreBtn:hover{border-color:rgba(79,140,255,.6)}

    /* Tools + Notes block (between torque/steps and chemistry line) */
    .infoBlock{
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border-soft);
      background: rgba(7,9,16,.55);
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .infoLine{
      font-size: 12px;
      color: #d7d8df;
      line-height: 1.35;
    }
    .infoKey{
      font-weight: 800;
      letter-spacing: .02em;
      color: #cfe0ff;
    }

    /* Candidate chooser (safety rail #3) */
    .candidates{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:10px;
    }
    .candBtn{
      width:100%;
      text-align:left;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(7,9,16,.75);
      color:var(--text);
      padding:10px 12px;
      cursor:pointer;
      font-size:12px;
      line-height:1.25;
    }
    .candBtn:focus{outline:none}
    @media (hover: hover) and (pointer: fine){
      .candBtn:hover{border-color:rgba(79,140,255,.6)}
    }
    .candSub{display:block;margin-top:4px;font-size:11px;color:var(--sub)}
    .candCard{padding:14px}
    .candRow{display:flex;gap:14px;align-items:flex-start}
    .candThumbWrap{
      width: 260px;height: 170px;flex: 0 0 260px;
      border-radius:12px;overflow:hidden;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      display:flex;align-items:center;justify-content:center;
    }
    .candThumb{width:100%;height:100%;object-fit:contain}
    .candThumbPh{font-size:10px;color:var(--sub);text-align:center;padding:6px;line-height:1.2}
    .candInfo strong{font-size:14px;display:block}
    .candMeta{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}
    .pillMini{
      display:inline-flex;align-items:center;
      padding:4px 8px;border-radius:999px;
      font-size:11px;border:1px solid var(--border);
      background:rgba(255,255,255,.04);color:var(--text);
      white-space:nowrap;
    }
    .pillMini.pillGhost{background:transparent;color:var(--sub)}

  
    .itemNumber{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border-muted);
      background: rgba(7,9,16,.45);
      font-size:12px;
      line-height:1.35;
    }
    .itemNumber .itemLabel{
      color: var(--muted);
      font-weight:700;
      margin-right:6px;
    }
    .refImages{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .refImage{
      width:100%;
      max-width:100%;
      border-radius:14px;
      border:1px solid var(--border-soft);
      background: rgba(7,9,16,.35);
    }


    /* === Model selector sheet (MVP) === */
    .sheetOverlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:999;
      padding:14px;
    }
    .sheetOverlay.show{display:flex}
    .sheet{
      width:100%;
      max-width:760px;
      border-radius:20px 20px 18px 18px;
      border:1px solid var(--border);
      background:linear-gradient(145deg,var(--panel),var(--panel2));
      box-shadow:0 18px 55px rgba(0,0,0,.75);
      overflow:hidden;
    }
    .sheetHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      border-bottom:1px solid var(--border-muted);
    }
    
    .sheetLeft{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .sheetLeft .sheetTitle{
      margin:0;
    }
.sheetTitle{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.09em;
      color:var(--sub);
      font-weight:800;
    }
    .sheetClose{
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(9,11,18,.85);
      color:var(--text);
      font-size:11px;
      padding:7px 10px;
      cursor:pointer;
    }
    .sheetClose:hover{border-color:rgba(79,140,255,.6)}
    .sheetBody{
      padding:10px 10px 12px;
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:62vh;
      overflow:auto;
    }
    .makeLabel{
      margin-top:6px;
      padding:6px 6px 0;
      font-size:11px;
      color:var(--muted);
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    
    .groupLabel{
      margin-top:6px;
      padding:8px 6px 0;
      font-size:10px;
      color:var(--sub);
      letter-spacing:.08em;
      text-transform:uppercase;
      opacity:.9;
    }
.modelBtn{
      width:100%;
      text-align:left;
      border-radius:14px;
      border:1px solid var(--border-muted);
      background:rgba(7,9,16,.55);
      color:var(--text);
      padding:10px 12px;
      cursor:pointer;
      font-size:12px;
      line-height:1.25;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    @media (hover: hover) and (pointer: fine){
      .modelBtn:hover{border-color:rgba(79,140,255,.6)}
    }
    .modelBtn .right{
      flex:0 0 auto;
      font-size:11px;
      color:var(--sub);
      white-space:nowrap;
    }
    .modelBtn.active{
      border-color:rgba(39,228,159,.55);
      box-shadow:0 0 0 2px rgba(39,228,159,.12) inset;
    }
    .badge.clickable{cursor:pointer}
    .badge.clickable:hover{border-color:rgba(79,140,255,.6)}


    /* Small mic button next to model badge */
    .badgeRow{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;flex-wrap:wrap}
/* === Multi-match vertical card layout override === */
.candidates{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap:12px;
}

.candBtn.candCard{
  text-align:center;
}

.candRow{
  flex-direction:column;
  align-items:center;
}

.candInfo{
  width:100%;
}

.candInfo strong{
  display:block;
  margin-top:2px;
  line-height:1.2;
  /* tidy: clamp to 2 lines */
  display:-webkit-box;
  -webkit-box-orient:vertical;
  -webkit-line-clamp:2;
  overflow:hidden;
}

.candMeta{
  justify-content:center;
}
/* === End override === */


/* === Multi-match layout tweaks (wide image, title above) === */
.candThumbWrap{
  width: min(100%, 300px) !important;
  height: 200px !important;
  flex: 0 0 auto !important;

/* Route on/off toggle (top center) */
.routeToggleWrap{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;

}

  text-transform:uppercase;

  height:20px;
  border-radius:999px;

}
.routeToggle .knob{
  position:absolute;
  top:2px; left:2px;
  width:16px; height:16px;
  border-radius:999px;
  background:rgba(255,255,255,.75);
  transition:left .12s ease, background .12s ease;
}
.routeToggleWrap.on{

  background:rgba(39,228,159,.20);

  left:20px;

}

/* Hide ROUTE ON/OFF toggle UI (functionality remains) */

  <script>
    // =========================
    // URL param utility (MVP)
    // =========================
    // Support: ?reset=1  -> clears saved model selection (for testing)
    (function(){
      try{
        const params = new URLSearchParams(window.location.search);
        if (params.get("reset") === "1"){
          // Clear storage (most reliable across browsers)
          try{ localStorage.clear(); } catch(e){}

          // Also clear known keys explicitly (in case clear() is blocked)
          const keysToClear = [
            "TESA_last_model_id",
            "TESA_last_dataset_file",
            "TESA_LAST_MODEL_ID",
            "TESA_LAST_DATASET_FILE",
            "TESA_guest_query_count",
            "lastSelectedModelId",
            "lastSelectedDatasetFile"
          ];
          keysToClear.forEach(k=>{ try{ localStorage.removeItem(k); } catch(e){} });

          // Remember that a reset just happened (survives the redirect)
          try{ sessionStorage.setItem("__TESA_DID_RESET__", "1"); } catch(e){}

          // Remove reset=1 from URL and hard-navigate (avoids Chrome edge cases / BFCache)
          params.delete("reset");
          const qs = params.toString();
          const newUrl = window.location.pathname + (qs ? ("?" + qs) : "") + window.location.hash;

          window.location.replace(newUrl);
          return;
        }
      } catch(e){}
    })();


// =========================
    // Data + Safety rails
    // =========================
    let CURRENT_MODEL_ID = null;
    let CURRENT_DATASET_FILE = null;
    let CURRENT_MODEL_DISPLAY = null; // {make, label, years_label}
    // Persist last selected model (Structure A)
    const STORAGE_KEY_MODEL_ID = "TESA_last_model_id";
    const STORAGE_KEY_DATASET_FILE = "TESA_last_dataset_file";

    // =========================
    // Auth (Supabase)
    // =========================
    const SUPABASE_URL = "https://dlphjrdukumyjgfiijrq.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_5RIMIMM2lV6wTXFnNtmKrw_iSeNfVtp";
    let supabaseAuth = null;
    let CURRENT_USER = null;
    let authMode = "login";
    let authPromptReason = null;
    let GUEST_MODE = false;
    let appStarted = false;
    let appStartPromise = null;
    let ACCOUNT_ALERT = null;
    const GUEST_QUERY_LIMIT = 3;
    const GUEST_QUERY_COUNT_KEY = "TESA_guest_query_count";

    const authConfirmRow = document.getElementById("authConfirmRow");
    const authPasswordConfirm = document.getElementById("authPasswordConfirm");

    const authSecondaryRow = document.getElementById("authSecondaryRow");
    const authToggleBtn = document.getElementById("authToggleBtn");

    const authAccountEmail = document.getElementById("authAccountEmail");
    const authAccountSummary = document.getElementById("authAccountSummary");
    const authAccountNotice = document.getElementById("authAccountNotice");

    const authContactBtn = document.getElementById("authContactBtn");

    const authContactMessageLine = document.getElementById("authContactMessageLine");
    const authContactBackBtn = document.getElementById("authContactBackBtn");
    const authContactSubmitBtn = document.getElementById("authContactSubmitBtn");
    const authLogoutBtn = document.getElementById("authLogoutBtn");
    const authCloseBtn = document.getElementById("authCloseBtn");
    const authMessage = document.getElementById("authMessage");
    const authMenuBtn = document.getElementById("authMenuBtn");
    const authMenuAlertBadge = document.getElementById("authMenuAlertBadge");

    function setAuthMessage(text, type=""){
      if (!authMessage) return;
      authMessage.textContent = text || "";
      authMessage.classList.toggle("error", type === "error");
      authMessage.classList.toggle("ok", type === "ok");
    }

    function setContactMessage(text, type=""){
      if (!authContactMessageLine) return;
      authContactMessageLine.textContent = text || "";
      authContactMessageLine.classList.toggle("error", type === "error");
      authContactMessageLine.classList.toggle("ok", type === "ok");
    }

    let contactCloseTimer = null;
    function clearContactCloseTimer(){
      if (!contactCloseTimer) return;
      clearInterval(contactCloseTimer);
      contactCloseTimer = null;
    }

    function startContactCloseCountdown(seconds=5){
      clearContactCloseTimer();
      let remaining = seconds;
      setContactMessage(`Message sent. Closing in ${remaining}...`, "ok");
      contactCloseTimer = setInterval(()=>{
        remaining -= 1;
        if (remaining <= 0){
          clearContactCloseTimer();
          closeAuthOverlay();
          showAccountView();
          return;
        }
        setContactMessage(`Message sent. Closing in ${remaining}...`, "ok");
      }, 1000);
    }

    function setAuthTitle(text){
      if (!authTitle) return;
      authTitle.textContent = text || "";
    }

    function isAlreadyRegisteredAuthError(error){
      const msg = String(error?.message || "").toLowerCase();
      return msg.includes("already registered")
        || msg.includes("already exists")
        || msg.includes("user already")
        || msg.includes("email already");
    }

    function isValidEmail(value){
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value || "").trim());
    }

    function getAuthRedirectTo(){
      return window.location.origin + window.location.pathname;
    }

    function isPasswordRecoveryUrl(){
      const combined = `${window.location.search || ""} ${window.location.hash || ""}`;
      return /(?:[?&#]|\b)type=recovery\b/.test(combined);
    }

    function formatAccountDate(value){
      if (!value) return "Not set";
      const date = new Date(value);
      if (!Number.isFinite(date.getTime())) return "Not set";
      return date.toLocaleDateString(undefined, { year:"numeric", month:"short", day:"numeric" });
    }

    function isFutureDate(value){
      const t = Date.parse(value || "");
      return Number.isFinite(t) && t > Date.now();
    }

    function escapeAttrText(value){
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;");
    }

    function accountAlertFromCode(code, usage=null){
      const c = String(code || "").trim();
      if (c === "usage_limit_reached"){
        return {
          code: c,
          row: "Searches",
          message: "You've used all searches in your current plan.",
          usage: usage || null
        };
      }
      if (c === "trial_expired"){
        return {
          code: c,
          row: "Trial ends",
          message: "Your free trial has ended."
        };
      }
      if (c === "subscription_inactive"){
        return {
          code: c,
          row: "Status",
          message: "Your subscription is not active."
        };
      }
      return null;
    }

    function setAccountAlert(alert){
      ACCOUNT_ALERT = alert || null;
      updateAuthMenuLabel();
    }

    function handleAccountAccessBlock(code, message="", usage=null){
      const alert = accountAlertFromCode(code, usage) || {
        code: String(code || "access_denied"),
        row: "Status",
        message: message || "Your account needs attention."
      };
      setAccountAlert(alert);
      setStatus(alert.message, true, true);
      if (CURRENT_USER){
        openAuthOverlay();
      }
      return { __accessBlocked: true, code: alert.code, message: alert.message, usage: usage || null };
    }

    function accountInfoRow(label, value, warn=false){
      return `
        <div class="authInfoRow${warn ? " warn" : ""}">
          <div class="authInfoLabel">${escapeAttrText(label)}</div>
          <div class="authInfoValue">${escapeAttrText(value)}</div>
        </div>`;
    }

    function renderAccountSummary(rows, message=""){
      if (!authAccountSummary) return;
      if (message){
        authAccountSummary.innerHTML = accountInfoRow("Status", message);
        if (authAccountNotice){
          authAccountNotice.textContent = "";
          authAccountNotice.classList.remove("show");
        }
      } else {
        const body = rows.map(row => accountInfoRow(row[0], row[1], !!row[2])).join("");
        authAccountSummary.innerHTML = body;
        if (authAccountNotice){
          authAccountNotice.textContent = ACCOUNT_ALERT?.message ? `${ACCOUNT_ALERT.message}\nManage plan to continue.` : "";
          authAccountNotice.classList.toggle("show", !!ACCOUNT_ALERT?.message);
        }
      }
      authAccountSummary.classList.add("show");
    }

    function showAccountView(){
      setAuthTitle("Account");
      if (authAccountEmail) authAccountEmail.style.display = CURRENT_USER ? "" : "none";
      if (authAccountSummary) authAccountSummary.classList.toggle("show", !!CURRENT_USER);
      if (authAccountNotice) authAccountNotice.classList.toggle("show", !!ACCOUNT_ALERT?.message);
      if (authAccountActions) authAccountActions.classList.toggle("show", !!CURRENT_USER);
      if (authContactView) authContactView.classList.remove("show");
      if (authCloseBtn) authCloseBtn.classList.add("show");
      if (authContactSubmitBtn) authContactSubmitBtn.disabled = false;
      clearContactCloseTimer();
      setContactMessage("");
    }

    function showContactView(){
      if (!CURRENT_USER) return;
      setAuthTitle("Contact");
      if (authContactTitle) {
        authContactTitle.disabled = false;
        authContactTitle.value = "";
      }
      if (authContactMessage) {
        authContactMessage.disabled = false;
        authContactMessage.value = "";
      }
      if (authContactSubmitBtn) authContactSubmitBtn.disabled = false;
      if (authAccountEmail) authAccountEmail.style.display = "none";
      if (authAccountSummary) authAccountSummary.classList.remove("show");
      if (authAccountNotice) authAccountNotice.classList.remove("show");
      if (authAccountActions) authAccountActions.classList.remove("show");
      if (authContactView) authContactView.classList.add("show");
      if (authCloseBtn) authCloseBtn.classList.remove("show");
      setAuthMessage("");
      clearContactCloseTimer();
      setContactMessage("");
      const shouldAutoFocusContact = !window.matchMedia("(max-width: 768px), (pointer: coarse)").matches;
      if (shouldAutoFocusContact){
        try{ authContactMessage?.focus(); }catch(e){}
      }
    }

    function buildSupportTicketPayload(){
      const modelText = CURRENT_MODEL_DISPLAY
        ? `${CURRENT_MODEL_DISPLAY.make || ""} ${CURRENT_MODEL_DISPLAY.label || ""} ${CURRENT_MODEL_DISPLAY.years_label || ""}`.replace(/\s+/g, " ").trim()
        : "";
      return {
        user_id: CURRENT_USER?.id || null,
        email: CURRENT_USER?.email || "",
        title: String(authContactTitle?.value || "").trim(),
        message: String(authContactMessage?.value || "").trim(),
        make_id: SELECTED_MAKE_ID || null,
        make_label: SELECTED_MAKE_LABEL || CURRENT_MODEL_DISPLAY?.make || null,
        model_id: CURRENT_MODEL_ID || null,
        model_label: modelText || null,
        query_text: String(questionInput?.value || "").trim() || null,
        page_url: window.location.href,
        user_agent: navigator.userAgent || "",
        metadata: {
          account_alert: ACCOUNT_ALERT || null,
          dataset_file: CURRENT_DATASET_FILE || null
        }
      };
    }

    async function submitSupportTicket(){
      if (!supabaseAuth || !CURRENT_USER){
        setContactMessage("Sign in before contacting support.", "error");
        return;
      }
      const payload = buildSupportTicketPayload();
      if (!payload.title){
        setContactMessage("Enter a title.", "error");
        return;
      }
      if (!payload.message){
        setContactMessage("Enter a message.", "error");
        return;
      }
      if (authContactSubmitBtn) authContactSubmitBtn.disabled = true;
      setContactMessage("Sending...", "");
      try{
        const { error } = await supabaseAuth.from("support_tickets").insert(payload);
        if (error) throw error;
        if (authContactTitle) authContactTitle.disabled = true;
        if (authContactMessage) authContactMessage.disabled = true;
        startContactCloseCountdown(5);
      }catch(e){
        console.error("Support ticket failed:", e);
        setContactMessage("Message failed to send. Try again later.", "error");
      }finally{
        if (authContactSubmitBtn) authContactSubmitBtn.disabled = false;
      }
    }

    async function loadAccountSummary(){
      if (!supabaseAuth || !CURRENT_USER) return;
      try{
        const userId = CURRENT_USER.id;
        const [{ data: profile, error: profileError }, { data: entitlement, error: entitlementError }, { data: usageRows, error: usageError }] = await Promise.all([
          supabaseAuth.from("profiles").select("id,email,role").eq("id", userId).maybeSingle(),
          supabaseAuth.from("entitlements").select("*").eq("user_id", userId).maybeSingle(),
          supabaseAuth.from("usage_counters").select("search_count,period_start,period_end").eq("user_id", userId).order("period_start", { ascending:false }).limit(1)
        ]);
        if (profileError) throw profileError;
        if (entitlementError) throw entitlementError;
        if (usageError) throw usageError;

        const role = String(profile?.role || "").toLowerCase();
        const planRaw = String(entitlement?.plan || "trial").toLowerCase();
        const statusRaw = String(entitlement?.status || "active").toLowerCase();
        const isAdmin = role === "admin" || planRaw === "admin";
        const isPaid = !isAdmin && planRaw === "paid";
        const trialEnded = !isAdmin && !isPaid && !isFutureDate(entitlement?.trial_ends_at);
        const planLabel = isAdmin ? "Admin" : isPaid ? "Paid" : "Trial";
        const used = Number(usageRows?.[0]?.search_count || 0);
        const limit = Number(entitlement?.search_limit || 0);
        const remaining = limit > 0 ? Math.max(0, limit - used) : 0;
        const usageText = limit > 0 ? `${remaining}/${limit}` : (isAdmin ? "Unlimited" : `${used}`);
        const statusLabel = statusRaw ? statusRaw.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase()) : "Active";

        if (!isAdmin && !ACCOUNT_ALERT){
          if (isPaid && statusRaw !== "active"){
            setAccountAlert(accountAlertFromCode("subscription_inactive"));
          } else if (!isPaid && trialEnded){
            setAccountAlert(accountAlertFromCode("trial_expired"));
          } else if (limit > 0 && remaining <= 0){
            setAccountAlert(accountAlertFromCode("usage_limit_reached", { used, limit, remaining: 0 }));
          }
        }

        const rows = [["Plan", planLabel]];
        if (isAdmin){
          rows.push(["Access", "Unlimited"]);
        } else if (isPaid){
          rows.push(["Status", statusLabel, ACCOUNT_ALERT?.row === "Status"]);
          rows.push(["Searches left", usageText, ACCOUNT_ALERT?.row === "Searches"]);
          rows.push(["Next billing", formatAccountDate(entitlement?.current_period_end)]);
          rows.push(["Amount", "Not connected yet"]);
        } else {
          rows.push(["Searches left", usageText, ACCOUNT_ALERT?.row === "Searches"]);
          rows.push(["Trial ends", formatAccountDate(entitlement?.trial_ends_at), ACCOUNT_ALERT?.row === "Trial ends"]);
        }
        renderAccountSummary(rows);
      } catch(e){
        console.error("Account summary failed:", e);
        renderAccountSummary([], "Account details unavailable.");
      }
    }

    function getGuestQueryCount(){
      try{
        const n = Number(localStorage.getItem(GUEST_QUERY_COUNT_KEY) || "0");
        return Number.isFinite(n) ? Math.max(0, Math.min(GUEST_QUERY_LIMIT, Math.floor(n))) : 0;
      }catch(e){
        return 0;
      }
    }

    function setGuestQueryCount(next){
      const n = Math.max(0, Math.min(GUEST_QUERY_LIMIT, Math.floor(Number(next) || 0)));
      try{ localStorage.setItem(GUEST_QUERY_COUNT_KEY, String(n)); }catch(e){}
      updateAuthMenuLabel();
      return n;
    }

    function getGuestRemaining(){
      return Math.max(0, GUEST_QUERY_LIMIT - getGuestQueryCount());
    }

    function updateAuthMenuLabel(){
      if (!authMenuBtn) return;
      const hasAccountAlert = !!(CURRENT_USER && ACCOUNT_ALERT);
      authMenuBtn.classList.toggle("alert", hasAccountAlert);
      if (authMenuAlertBadge){
        authMenuAlertBadge.classList.toggle("show", hasAccountAlert);
      }
      if (CURRENT_USER){
        authMenuBtn.textContent = CURRENT_USER.email || "Account";
        authMenuBtn.title = CURRENT_USER.email || "Account";
      } else if (GUEST_MODE){
        const remain = getGuestRemaining();
        authMenuBtn.textContent = `Guest · ${remain}/${GUEST_QUERY_LIMIT}`;
        authMenuBtn.title = `Guest mode · ${remain}/${GUEST_QUERY_LIMIT}`;
      } else {
        authMenuBtn.textContent = "Sign in";
        authMenuBtn.title = "Sign in";
      }
    }

    function setAuthIntro(){
      if (!authTitle || !authLead) return;
      if (CURRENT_USER && authMode !== "update_password"){
        setAuthTitle("Account");
        if (authSubtitle) authSubtitle.style.display = "none";
        authLead.textContent = "";
        authLead.style.display = "none";
        return;
      }
      if (authSubtitle) authSubtitle.style.display = "none";
      if (authPromptReason === "guest_limit"){
        setAuthTitle("Create an account to continue");
        if (authSubtitle) authSubtitle.style.display = "none";
        authLead.innerHTML = `<span class="authLeadWarn">You've used 3 free searches.</span><br>Sign in or create an account to keep using SAM.`;
        return;
      }
      if (authMode === "recovery"){
        setAuthTitle("Reset password");
        authLead.textContent = "Enter your email and we'll send a reset link.";
      } else if (authMode === "update_password"){
        setAuthTitle("Set new password");
        authLead.textContent = "Enter a new password to finish resetting your account.";
      } else {
        setAuthTitle(authMode === "signup" ? "Create account" : "Welcome to SAM.");
        if (authMode === "signup"){
          authLead.textContent = "A verification email will be sent after signup.";
        } else {
          authLead.innerHTML = "SAM. is an AI-powered torque spec assistant.<br>Sign in to access torque data.";
        }
      }
    }

    function setAuthMode(mode){
      authMode = ["signup", "recovery", "update_password"].includes(mode) ? mode : "login";
      const needsPassword = authMode !== "recovery";
      const needsConfirm = authMode === "signup" || authMode === "update_password";
      const needsEmail = authMode !== "update_password";
      setAuthIntro();
      if (authSubmitBtn) {
        authSubmitBtn.textContent =
          authMode === "signup" ? "Create account" :
          authMode === "recovery" ? "Send reset email" :
          authMode === "update_password" ? "Update password" :
          "Sign in";
      }
      if (authToggleBtn) {
        authToggleBtn.textContent =
          authMode === "signup" ? "Already have an account?" :
          authMode === "recovery" || authMode === "update_password" ? "Back to sign in" :
          "Create an account";
      }
      if (authEmail) {
        authEmail.classList.toggle("authHidden", !needsEmail);
        authEmail.required = needsEmail;
      }

      document.body.style.top = `-${authScrollLockY}px`;
      document.body.style.left = "0";
      document.body.style.right = "0";
      document.body.style.width = "100%";
      document.body.style.overflow = "hidden";
    }
    function unlockPageScrollForAuth(){
      if (!authScrollLocked) return;
      authScrollLocked = false;

      document.body.style.position = "";
      document.body.style.top = "";
      document.body.style.left = "";
      document.body.style.right = "";
      document.body.style.width = "";
      document.body.style.overflow = "";

      CURRENT_USER = session?.user || null;
      const signedIn = !!CURRENT_USER;
      if (signedIn) GUEST_MODE = false;
      else ACCOUNT_ALERT = null;
      document.body.classList.toggle("authLocked", !(signedIn || GUEST_MODE));
      updateAuthMenuLabel();
      if (authLogoutBtn) authLogoutBtn.style.display = signedIn ? "" : "none";
      if (authContactBtn) authContactBtn.style.display = signedIn ? "" : "none";

      if (authAccountActions) authAccountActions.classList.toggle("show", signedIn);

      if (authAccountNotice) authAccountNotice.classList.toggle("show", signedIn && authMode !== "update_password" && !!ACCOUNT_ALERT?.message);

    function initSupabaseAuth(){
      if (supabaseAuth) return supabaseAuth;
      const factory = window.supabase && window.supabase.createClient;
      if (!factory) return null;
      supabaseAuth = factory(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });
      return supabaseAuth;

    async function startAppAfterAuth(){
      if (appStarted) {
        document.body.classList.remove("authLocked");

      if (appStartPromise) return appStartPromise;

        .then(()=>{ appStarted = true; })

    async function initAuth(){
      bindAuthEvents();
      const client = initSupabaseAuth();
      if (!client){
        document.body.classList.add("authLocked");
        openAuthOverlay();
        setAuthMessage("Auth SDK failed to load. Check your connection and refresh.", "error");
        return false;
      }

      const recoveryRedirect = isPasswordRecoveryUrl();
      const { data, error } = await client.auth.getSession();
      if (error) console.warn("Supabase session error:", error);
      if (recoveryRedirect && data?.session?.user){
        CURRENT_USER = data.session.user;
        GUEST_MODE = false;
        document.body.classList.add("authLocked");
        setAuthMode("update_password");
        openAuthOverlay();
        setAuthMessage("Enter a new password for your account.", "ok");
        return false;
      }
      setAuthUi(data?.session || null);

      client.auth.onAuthStateChange((_event, session)=>{
        if (_event === "PASSWORD_RECOVERY" && session?.user){
          CURRENT_USER = session.user;
          GUEST_MODE = false;
          document.body.classList.add("authLocked");
          setAuthMode("update_password");
          openAuthOverlay();
          setAuthMessage("Enter a new password for your account.", "ok");
          return;
        }
        setAuthUi(session);
        if (session?.user) {
          startAppAfterAuth().catch((e)=>{
            console.error(e);
            setStatus("App failed to start.", true, true);
          });
        } else {
          setStatus("Sign in to continue.", true, false);
        }
      });

      return !!data?.session?.user;
    }

    function bindAuthEvents(){
      if (bindAuthEvents.done) return;
      bindAuthEvents.done = true;

      if (authMenuBtn){
        authMenuBtn.addEventListener("click", ()=>{
          openAuthOverlay();

          if (authMode === "update_password"){

          setAuthMode(authMode === "login" ? "signup" : "login");

        authGuestBtn.addEventListener("click", ()=>{

        });

      const bindPasswordToggle = (input, btn, labelBase)=>{
        if (!input || !btn) return;
        btn.addEventListener("click", ()=>{
          const show = input.type === "password";
          input.type = show ? "text" : "password";
          btn.classList.toggle("showing", show);
          btn.setAttribute("aria-label", `${show ? "Hide" : "Show"} ${labelBase}`);
          btn.title = show ? "Hide password" : "Show password";
        });
      };
      bindPasswordToggle(authPassword, authPasswordToggle, "password");
      bindPasswordToggle(authPasswordConfirm, authPasswordConfirmToggle, "confirm password");
      if (authForm){
        authForm.addEventListener("submit", async (ev)=>{
          ev.preventDefault();
          const client = initSupabaseAuth();
          if (!client){
            setAuthMessage("Auth SDK failed to load. Refresh and try again.", "error");
            return;
          }
          const email = String(authEmail?.value || "").trim();
          const password = String(authPassword?.value || "");
          const passwordConfirm = String(authPasswordConfirm?.value || "");
          if (authMode === "recovery"){
            if (!email){
              setAuthMessage("Enter your email.", "error");
              return;
            }
            if (!isValidEmail(email)){
              setAuthMessage("Enter a valid email address.", "error");
              return;
            }
          } else if (authMode === "update_password"){
            if (!password){
              setAuthMessage("Enter a new password.", "error");
              return;
            }
          } else if (!email || !password){
            setAuthMessage("Enter email and password.", "error");
            return;
          }
          if (authMode !== "update_password" && !isValidEmail(email)){
            setAuthMessage("Enter a valid email address.", "error");
            return;
          }
          if ((authMode === "signup" || authMode === "update_password") && password !== passwordConfirm){
            setAuthMessage("Passwords do not match.", "error");
            return;
          }
          if (authSubmitBtn) authSubmitBtn.disabled = true;
          setAuthMessage(
            authMode === "signup" ? "Creating account..." :
            authMode === "recovery" ? "Sending reset email..." :
            authMode === "update_password" ? "Updating password..." :
            "Signing in..."
          );
          try{
            if (authMode === "signup"){
              const { data, error } = await client.auth.signUp({
                email,
                password,
                options: { emailRedirectTo: getAuthRedirectTo() }
              });
              if (error) throw error;
              const noNewIdentity = Array.isArray(data?.user?.identities) && data.user.identities.length === 0;
              if (noNewIdentity){
                setAuthMode("login");
                if (authEmail) authEmail.value = email;
                setAuthMessage("This email is already registered. Sign in instead.", "error");
                return;
              }
              if (data?.session){
                setAuthUi(data.session);
                await startAppAfterAuth();
              } else {
                setAuthMode("login");
                if (authEmail) authEmail.value = email;
                setAuthMessage("Account created. Check your email to verify your account, then sign in.", "ok");
              }
            } else if (authMode === "recovery"){
              const { error } = await client.auth.resetPasswordForEmail(email, {
                redirectTo: getAuthRedirectTo()
              });
              if (error) throw error;
              setAuthMode("login");
              if (authEmail) authEmail.value = email;
              setAuthMessage("If this email is registered, a password reset link has been sent. If not, create an account.", "ok");
            } else if (authMode === "update_password"){
              const { error } = await client.auth.updateUser({ password });
              if (error) throw error;
              setAuthMessage("Password updated. You can continue using SAM.", "ok");
              setAuthMode("login");
              setAuthUi((await client.auth.getSession()).data?.session || null);
              await startAppAfterAuth();
            } else {
              const { data, error } = await client.auth.signInWithPassword({ email, password });
              if (error) throw error;
              setAuthUi(data?.session || null);
              await startAppAfterAuth();
            }
          } catch(e){
            if (authMode === "signup" && isAlreadyRegisteredAuthError(e)){
              setAuthMode("login");
              if (authEmail) authEmail.value = email;
              setAuthMessage("This email is already registered. Sign in instead.", "error");
            } else {
              setAuthMessage(e?.message || "Authentication failed.", "error");
            }
          } finally {
            if (authSubmitBtn) authSubmitBtn.disabled = false;
          }
        });
      }
    }

];

];

            return data.map(x => String(x)).filter(Boolean);
          };

          const fillerJson = await safeJsonArray(fillerResp);
          const genericJson = await safeJsonArray(genericResp);
          const extraJson = await safeJsonArray(extraResp);

          if (fillerJson) QUERY_FILLER_PHRASES = fillerJson;

    async function loadSpecTriggers(){
      if (__specTriggersLoaded) return;
      if (__specTriggersPromise) return __specTriggersPromise;

      __specTriggersPromise = (async ()=>{
        try{
          const r = await fetch(SPEC_TRIGGERS_JSON_PATH, { cache: "no-cache" });

          const seen = new Set();
          for (const it of arr){
            const phrase = (it && it.trigger_phrase) ? String(it.trigger_phrase).trim().toLowerCase() : "";
            if (!phrase) continue;
            // spec triggers are tokens (1-3 words allowed, but we primarily use single tokens)
            if (seen.has(phrase)) continue;
            seen.add(phrase);
            out.push(phrase);
          }

          if (out.length > 0){

    // =========================
    // Route v2 (LLM preprocess) – front decides intent (P/F/S rules)
    // =========================
    const LLM_QUERY_CONF_MIN = 0.85;      // use llm_query for trigger scan only if >= this
    const PART_PHRASES_CONF_MIN = 0.60;   // use LLM part_phrases only if >= this

    const LLM_QUERY_GUARD_MAX_EDIT_DIST = 2;
    const LLM_QUERY_GUARD_REQUIRE_SAME_TOKEN_COUNT = true; // disallow token add/delete

    function __tokenizeNormalized(nq){
      const s = String(nq || "").trim().toLowerCase();
      return s ? s.split(/\s+/).filter(Boolean) : [];
    }

    function __editDistance(a, b){
      a = String(a || "");
      b = String(b || "");
      if (a === b) return 0;
      const al = a.length, bl = b.length;
      if (al === 0) return bl;
      if (bl === 0) return al;

      const dp = new Array(bl + 1);
      for (let j=0; j<=bl; j++) dp[j] = j;

      for (let i=1; i<=al; i++){
        let prev = dp[0];
        dp[0] = i;
        for (let j=1; j<=bl; j++){
          const tmp = dp[j];
          const cost = (a[i-1] === b[j-1]) ? 0 : 1;
          dp[j] = Math.min(
            dp[j] + 1,
            dp[j-1] + 1,
            prev + cost
          );
          prev = tmp;
        }
      }
      return dp[bl];
    }

    function __llmQueryPassesGuard(localNq, llmNq){
      const a = __tokenizeNormalized(localNq);
      const b = __tokenizeNormalized(llmNq);

      if (LLM_QUERY_GUARD_REQUIRE_SAME_TOKEN_COUNT && a.length !== b.length) return false;
      if (b.length === 0 || a.length === 0) return false;

      for (let i=0; i<Math.min(a.length, b.length); i++){
        const d = __editDistance(a[i], b[i]);
        if (d > LLM_QUERY_GUARD_MAX_EDIT_DIST) return false;
      }
      return true;
    }

    function __filterSingleTokenTriggers(terms, specTerms, fastTerms){
      if (!Array.isArray(terms)) return [];
      const banned = new Set([
        ...(Array.isArray(specTerms) ? specTerms : []),
        ...(Array.isArray(fastTerms) ? fastTerms : [])
      ].map(s => String(s||"").trim().toLowerCase()).filter(Boolean));

      const out = [];
      const seen = new Set();
      for (const t of terms){
        if (typeof t !== "string") continue;
        const norm = t.trim().toLowerCase();
        if (!norm) continue;
        if (seen.has(norm)) continue;
        if (norm.includes(" ")) { out.push(norm); seen.add(norm); continue; }
        if (banned.has(norm)) continue;
        out.push(norm);
        seen.add(norm);
      }
      return out;
    }

    function __decideIntentFromPFS(part_terms_found, fastener_terms_found, spec_terms_found){

    // Returns a JPEG dataURL (data:image/jpeg;base64,...) unless it fails, in which case you can fall back to fileToDataUrl().
    async function fileToVisionDataUrl(file, maxDim = 1280, quality = 0.82){
      try{
        const url = URL.createObjectURL(file);
        const img = await new Promise((resolve, reject) => {
          const im = new Image();
          im.onload = () => resolve(im);
          im.onerror = () => reject(new Error("image_load_error"));
          im.src = url;
        });

        let w = img.naturalWidth || img.width || 0;
        let h = img.naturalHeight || img.height || 0;
        if (!w || !h) throw new Error("invalid_image_dim");

        const scale = Math.min(1, maxDim / Math.max(w, h));
        const tw = Math.max(1, Math.round(w * scale));
        const th = Math.max(1, Math.round(h * scale));

        const canvas = document.createElement("canvas");
        canvas.width = tw;
        canvas.height = th;
        const ctx = canvas.getContext("2d", { alpha: false });
        ctx.drawImage(img, 0, 0, tw, th);

        // JPEG is generally much smaller than PNG for photos.
        const dataUrl = canvas.toDataURL("image/jpeg", quality);

        try{ URL.revokeObjectURL(url); }catch(e){}
        return dataUrl;
      }catch(e){
        return "";
      }
    }

          setTimeout(()=>{ el.select(); }, 0);
        }catch(e){}
      };
      el.addEventListener("focus", selectAll);

      // On desktop, mouseup can clear selection; prevent that when focusing
      el.addEventListener("mouseup", (e)=>{
        // If text is already selected, keep it
        if (el.selectionStart !== el.selectionEnd) {
          e.preventDefault();
        }
      });

      // Explicit click/touch should also select all (useful when already focused)
      el.addEventListener("click", selectAll);

    function flattenModels(idx){
      const out = [];
      const mfgs = Array.isArray(idx?.manufacturers) ? idx.manufacturers : [];
      mfgs.forEach(mfg=>{
        const make = mfg?.make || mfg?.make_id || "Unknown";
        const make_id = mfg?.make_id || String(make).toLowerCase();
        const make_sort_order = (typeof mfg?.sort_order === "number") ? mfg.sort_order : null;
        const models = Array.isArray(mfg?.models) ? mfg.models : [];
        models.forEach(m=>{
          out.push({
            make,
            make_id,
            make_sort_order,
            id: m?.id,
            label: m?.label || m?.model || m?.name || "Model",
            years_label: m?.years_label || (m?.years ? `${m.years.from}–${m.years.to}` : ""),
            years: m?.years_label || (m?.years ? `${m.years.from}–${m.years.to}` : ""),
            years_from: (m?.years && typeof m.years.from === "number") ? m.years.from : null,
            years_to: (m?.years && typeof m.years.to === "number") ? m.years.to : null,
            group_id: m?.group_id || null,
            group_label: m?.group_label || null,
            group_sort_order: (typeof m?.group_sort_order === "number") ? m.group_sort_order : null,
            sort_order: (typeof m?.sort_order === "number") ? m.sort_order : null,
            file: m?.file,
            aliases: Array.isArray(m?.aliases) ? m.aliases : []
          });
        });
      });
      return out.filter(x=>x.id && x.file);
    }

    function renderSheet(){
      if (!sheetBody || !modelIndex) return;

      const models = flattenModels(modelIndex);
      const manufacturers = Array.isArray(modelIndex?.manufacturers) ? modelIndex.manufacturers : [];

      // Build make list from index.json (make_id/make)
      const makes = manufacturers
        .map(m => ({
          id: m?.make_id || m?.id || String(m?.make || m?.label || "unknown").toLowerCase(),
          label: m?.make || m?.label || m?.make_id || m?.id || "Unknown",
          sort_order: (typeof m?.sort_order === "number") ? m.sort_order : null
        }))
        .filter(m => m.id && m.label);

      const sortValue = (v)=> (typeof v === "number" && Number.isFinite(v)) ? v : Number.POSITIVE_INFINITY;

      // Step 1: pick manufacturer
      if (sheetMode === "make" || !SELECTED_MAKE_ID){
        let html = '';
        makes
          .slice()
          .sort((a,b)=>{
            const so = sortValue(a.sort_order) - sortValue(b.sort_order);
            if (so !== 0) return so;
            return String(a.label).localeCompare(String(b.label));
          })
          .forEach(mk=>{
            const isActive = (mk.id === SELECTED_MAKE_ID);
            html += `
              <button class="modelBtn ${isActive ? 'active' : ''}" type="button" data-make-id="${escapeHtml(mk.id)}">
                <span><strong>${escapeHtml(mk.label)}</strong></span>
                <span class="right">${isActive ? 'Selected' : ''}</span>
              </button>`;
          });

        sheetBody.innerHTML = html;

        sheetBody.querySelectorAll("[data-make-id]").forEach(btn=>{
          btn.addEventListener("click", ()=>{
            const makeId = btn.getAttribute("data-make-id");
            const prevMake = SELECTED_MAKE_ID;
            const mk = makes.find(x => x.id === makeId);
            SELECTED_MAKE_ID = makeId;
            SELECTED_MAKE_LABEL = mk ? mk.label : makeId;
            setSheetMode("model");
            renderSheet();
          });
        });
        return;
      }

      // Step 2: pick model within selected manufacturer (grouped)
      const makeId = SELECTED_MAKE_ID;
      const mk = makes.find(x => x.id === makeId) || { id: makeId, label: (SELECTED_MAKE_LABEL || makeId) };

      const inMake = models.filter(m => m.make_id === makeId);

      // group helpers
      const norm = (s)=> String(s||"").trim();
      const otherKey = "__other__";
      const groupKeyFor = (m)=>{
        const gl = norm(m.group_label);
        const gi = norm(m.group_id);
        if (gl) return gl;
        if (gi) return gi;
        return otherKey;
      };
      const groupLabelForKey = (k)=> (k===otherKey ? "Other" : k);

      const byGroup = {};
      for (const m of inMake){
        const gk = groupKeyFor(m);
        (byGroup[gk] ||= []).push(m);
      }

      const groupKeys = Object.keys(byGroup).sort((a,b)=>{
        const aSort = Math.min(...byGroup[a].map(m => sortValue(m.group_sort_order)));
        const bSort = Math.min(...byGroup[b].map(m => sortValue(m.group_sort_order)));
        if (aSort !== bSort) return aSort - bSort;
        if (a===otherKey && b!==otherKey) return 1;
        if (b===otherKey && a!==otherKey) return -1;
        return a.localeCompare(b);
      });

      let html = '';

      groupKeys.forEach(gk=>{
        html += `<div class="groupLabel">${escapeHtml(groupLabelForKey(gk))}</div>`;

        const list = byGroup[gk].slice().sort((a,b)=>{
          const so = sortValue(a.sort_order) - sortValue(b.sort_order);
          if (so !== 0) return so;
          const c = String(a.label||"").localeCompare(String(b.label||""));
          if (c!==0) return c;
          return String(a.years_label||"").localeCompare(String(b.years_label||""));
        });

        list.forEach(m=>{
          const active = (m.id === CURRENT_MODEL_ID) ? "active" : "";
          const right = m.years_label ? `<span class="right">${escapeHtml(m.years_label)}</span>` : "";
          html += `
            <button class="modelBtn ${active}" type="button" data-model-id="${escapeHtml(m.id)}" data-file="${escapeHtml(m.file)}">
              <span><strong>${escapeHtml(m.label)}</strong></span>
              ${right}
            </button>`;
        });
      });

      sheetBody.innerHTML = html;

      sheetBody.querySelectorAll("[data-model-id]").forEach(btn=>{
        btn.addEventListener("click", async ()=>{
          const id = btn.getAttribute("data-model-id");
          const file = btn.getAttribute("data-file");
          try{
            await setCurrentModel(id, file, {speakConfirm:true});
          } finally {
            closeSheet();
          }
        });
      });
    }

    if (!/^https?:\/\//i.test(base) && !base.startsWith("./") && !base.startsWith("/") ){
      base = "./" + base;
    }
    // replace filename with service.json
    const slash = base.lastIndexOf("/");
    if (slash === -1) return "./service.json";
    return base.slice(0, slash + 1) + "service.json";
  } catch(e){
    return null;
  }
}

function normalizeAlias(s){
  return String(s||"").toLowerCase().trim();
}

function findSpecCandidates(nq){
  if (!specsIndex || !Array.isArray(specsIndex.specs)) return [];

  const q = normalizeAlias(nq);
  if (!q) return [];

  const scored = [];
  for (const sp of specsIndex.specs){
    const title = normalizeAlias(sp.title || sp.topic_title || "");
    const aliases = Array.isArray(sp.aliases) ? sp.aliases : [];
    let best = 0;

    // title match
    if (title){
      if (q === title) best = Math.max(best, 100);
      else if (title.includes(q)) best = Math.max(best, 60);
      else if (q.includes(title) && title.length >= 4) best = Math.max(best, 55);
    }

    for (const a of aliases){
      const aa = normalizeAlias(a);
      if (!aa) continue;
      if (q === aa) best = Math.max(best, 100);
      else if (aa.includes(q)) best = Math.max(best, 70);
      else if (q.includes(aa) && aa.length >= 4) best = Math.max(best, 65);
    }

    if (best > 0) scored.push({spec: sp, score: best});
  }
  scored.sort((a,b)=>b.score-a.score);
  return scored;
}

// -------------------------

function extractDatasetMeta(data){
  // Current schema
  if (data && typeof data === "object" && data.dataset && Array.isArray(data.items)){
    const ds = data.dataset || {};
    const years = ds.years || {};

      make: ds.make ?? ds.manufacturer ?? ds.brand ?? "Unknown",

  };

function splitList(val){
  if (val == null) return [];
  if (Array.isArray(val)) return val.map(x => String(x ?? "").trim()).filter(Boolean);
  return String(val)

    .map(s => s.trim())

}

// --- Torque helpers (support tightening_type + string/array torque_steps) ---
function parseTorqueStepsText(text){
  // Accept separators: newline or semicolon. Preserve user-entered content as much as possible.
  return String(text)
    .split(/\r?\n|;/)
    .map(s => s.trim())
    .filter(Boolean);
}

function getTorqueStepsRows(item){
  // Returns rows for UI in the form [{label, value}] for multi-step; [] otherwise.
  const tt = (item && item.tightening_type ? String(item.tightening_type).trim().toLowerCase() : "");
  if (tt !== "multi_step") return [];

  // If torque_steps is an array of objects (structured), keep existing behavior.
  if (Array.isArray(item.torque_steps) && item.torque_steps.length){
    return item.torque_steps.map((s, idx) => {
      const rawLabel = (s.step != null ? String(s.step) : String(idx + 1)).trim();
      const parts = [];
      if (s.torque_nm != null) parts.push(`${s.torque_nm} Nm`);
      if (s.angle_deg != null) parts.push(`+ ${s.angle_deg}°`);
      const value = parts.length ? parts.join(" ") : (s.raw || "Follow manual");
      return { label: rawLabel, value };
    });
  }

  // If torque_steps is a string, parse lines into rows.
  if (item.torque_steps != null && String(item.torque_steps).trim()){
    const lines = parseTorqueStepsText(item.torque_steps);
    return lines.map((line, idx) => {
      // If the line already has a label (e.g., "Step 1: 5 Nm"), keep it.
      const parts = line.split(":");
      if (parts.length >= 2){
        const label = parts.shift().trim();
        const value = parts.join(":").trim();
        return { label: label || String(idx + 1), value: value || "Follow manual" };
      }
      return { label: String(idx + 1), value: line };
    });
  }

  return [];
}

// --- Multi-step vs Multi-size classification (string torque_steps) ---
function classifyTorqueStepsRows(rows){
  // Returns "multi_step" or "multi_size" (default multi_step)
  if (!Array.isArray(rows) || !rows.length) return "multi_step";
  const labels = rows.map(r => String(r?.label ?? "").trim());
  const allSize = labels.length > 0 && labels.every(l => /^m\d+$/i.test(l));
  if (allSize) return "multi_size";

  const allStep = labels.length > 0 && labels.every(l => /^step\s*\d+$/i.test(l) || /^step\d+$/i.test(l) || /^\d+$/.test(l));
  if (allStep) return "multi_step";

  // Mixed/unknown → treat as multi_step (safer)
  return "multi_step";
}

function normalizeStepLabel(label){
  let s = String(label ?? "").trim();
  if (!s) return "";
  // "1" -> "STEP1", "Step 1" -> "STEP1", "Step1" -> "STEP1"
  const m = s.match(/(\d+)/);
  if (m) return `STEP${m[1]}`;

  const s = String(text ?? "");

    function escapeRegExp(str){
      return String(str).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function normTextForTokens(s){
      let out = String(s || "").toLowerCase();

      // Remove common intent filler phrases (e.g., "tell me about", "show me").
      // This keeps scoring focused on part-relevant tokens.
      for (const ph of QUERY_FILLER_PHRASES){
        if (!ph) continue;
        // Escape any regex characters so phrases remain plain text matches.
        // Use word boundaries at both ends to avoid nuking substrings.
        const rePh = new RegExp("\\b" + escapeRegExp(ph) + "\\b", "gi");
        out = out.replace(rePh, " ");
      }

      return out
        .replace(/[“”"']/g, "")
        .replace(/[^a-z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function tokenize(s){
      const t = normTextForTokens(s);
      if (!t) return [];
      const raw = t.split(" ");
      // Keep "m6", "m10" etc (len 2+), drop 1-char noise
      return raw.filter(w => w.length >= 2);

// Fast path tokenizer for already-normalized strings (output of normalizeQuery()).
// Assumes: lowercase, single-space separated tokens, filler phrases already removed, STOPWORDS already removed.
function tokenizeNormalized(s){

  if (!t) return [];
  return t.split(/\s+/).filter(w => w.length >= 2);

    // Tokenizer used ONLY inside normalizeQuery() to remove STOPWORDS.
    // It intentionally does NOT apply STOPWORDS filtering itself; normalizeQuery decides what to drop.
    function tokenizeForNormalize(s){

      if (!t) return [];
      return t.split(" ").filter(Boolean);
    }


    function uniq(arr){
      return Array.from(new Set(arr));
    }

    function buildItemSearchText(item){
      const parts = [];
      if (item?.component_name) parts.push(String(item.component_name));
      if (Array.isArray(item?.common_name) && item.common_name.length){
        parts.push(item.common_name.map(x=>String(x||"")).join(" "));
      } else if (item?.common_name){
        parts.push(String(item.common_name));

    function buildScoringIndex(items){
      TOKEN_FREQ = new Map();
      TOKEN_TOTAL_ITEMS = Array.isArray(items) ? items.length : 0;
      SCORING_INDEX_READY = false;

      if (!Array.isArray(items) || !items.length) return;

      for (const it of items){
        // cache normalized text and tokens per item for fast scoring
        const txt = buildItemSearchText(it);
        it.__searchText = txt; // normalized full text
        const toks = uniq(tokenize(txt));
        it.__tokens = toks;

        for (const tok of toks){
          TOKEN_FREQ.set(tok, (TOKEN_FREQ.get(tok) || 0) + 1);
        }

      SCORING_INDEX_READY = true;

    function ngrams(tokens, n){
      const out = [];
      if (!Array.isArray(tokens) || tokens.length < n) return out;
      for (let i=0; i<=tokens.length - n; i++){
        out.push(tokens.slice(i, i+n).join(" "));
      }
      return out;
    }

    function phraseBonus(queryTokens, itemSearchText){
      // Conservative bonuses; cap to avoid overpowering overlap/coverage
      let b = 0;
      const q3 = ngrams(queryTokens, 3);
      const q2 = ngrams(queryTokens, 2);

      for (const p of q3){
        if (itemSearchText.includes(p)) b += 10;
      }
      for (const p of q2){
        if (itemSearchText.includes(p)) b += 6;
      }
      return Math.min(b, 24);
    }

    function rareTokenBonus(matchedTokens){
      // Tie-breaker: reward discriminative terms, never penalize missing role words
      let b = 0;
      for (const t of matchedTokens){
        const f = TOKEN_FREQ.get(t) || 9999;
        if (f <= 2) b += 8;
        else if (f <= 5) b += 5;
        else if (f <= 12) b += 2;
      }
      return Math.min(b, 20);
    }

    function exactMatchBonus(queryNorm, item){
      // "equal" match gets a strong boost, but we still require other signals in most cases
      let b = 0;

      const cn = normTextForTokens(item?.component_name || "");
      if (cn){
        if (queryNorm === cn) b = Math.max(b, 18);
        else if (queryNorm.includes(cn) || cn.includes(queryNorm)) b = Math.max(b, 6);
      }

      const ca = Array.isArray(item?.common_name) ? item.common_name : (item?.common_name ? [item.common_name] : []);
      for (const aRaw of ca){
        const a = normTextForTokens(aRaw);
        if (!a) continue;
        if (queryNorm === a) b = Math.max(b, 18);

      if (!bonusTokens || !bonusTokens.length) return {score:0, hits:[]};
      const hits = [];

      for (const bc of bonusTokens){

    function scoreItemV2(queryNorm, item, bonusTokens){
      // queryNorm is expected to be the already-normalized nq (output of normalizeQuery).
      const qTokens = tokenizeNormalized(queryNorm);
      if (!qTokens.length) return { score: 0, breakdown: { reason: "NO_TOKENS" } };

      const itemText = item?.__searchText || buildItemSearchText(item);
      const itemTokens = item?.__tokens || uniq(tokenize(itemText));

      if (!itemText || !itemTokens.length) return { score: 0, breakdown: { reason: "EMPTY_ITEM" } };

      const itemSet = new Set(itemTokens);

      const matched = [];
      for (const t of qTokens){
        if (itemSet.has(t)) matched.push(t);
      }

      const overlapCount = matched.length;
      if (!overlapCount) return { score: 0, breakdown: { overlap: 0 } };

      // Components
      const overlapScore = overlapCount * 6; // main driver
      const coverage = overlapCount / qTokens.length;
      const coverageScore = Math.round(coverage * 30); // 0..30
      const pBonus = phraseBonus(qTokens, itemText);   // 0..24
      const rBonus = rareTokenBonus(uniq(matched));    // 0..20
      const eBonus = exactMatchBonus(queryNorm, item); // 0..18
      const llm = llmTokenBonus(bonusTokens, itemSet); // 0..10

      let total = overlapScore + coverageScore + pBonus + rBonus + eBonus + (llm.score||0);

      // Floor only (no 100 cap)
      if (total < 0) total = 0;

      const breakdown = {
        overlap: overlapScore,
        coverage: coverageScore,
        phrase: pBonus,
        rare: rBonus,
        exact: eBonus,
        llm_bonus: llm.score || 0,
        llm_hits: llm.hits || [],
        matched_tokens: uniq(matched),
        q_tokens: qTokens
      };

      return usage && Object.prototype.hasOwnProperty.call(usage, key) ? usage[key] : null;
    }

    function normalizeSearchResultType(type){
      const allowed = new Set([
        "match",
        "spec_match",
        "multiple_matches",
        "no_match",
        "low_confidence",
        "too_generic",
        "needs_detail",
        "usage_limit_reached",
        "trial_expired",
        "subscription_inactive",
        "guest_limit",
        "usage_confirm_failed",
        "usage_blocked"
      ]);
      return allowed.has(type) ? type : "usage_blocked";
    }

    function buildSearchEventPayload(ctx){

      const best = ctx?.best || null;
      const second = ctx?.second || null;
      const candidates = Array.isArray(ctx?.candidates) ? ctx.candidates : [];
      const metadata = Object.assign({}, ctx?.metadata || {});
      const topCandidates = buildTopCandidateMetadata(candidates, 5);
      if (topCandidates.length) metadata.top_candidates = topCandidates;
      if (ctx?.routeIntent) metadata.route_intent = ctx.routeIntent;
      if (Array.isArray(ctx?.partTerms)) metadata.part_terms_found = ctx.partTerms;
      if (Array.isArray(ctx?.specTerms)) metadata.spec_terms_found = ctx.specTerms;
      if (Array.isArray(ctx?.fastenerTerms)) metadata.fastener_terms_found = ctx.fastenerTerms;
      if (ctx?.resultReason) metadata.result_reason = ctx.resultReason;

      const isVision = ctx?.analysisSource === "vision";
      const isRoute = ctx?.analysisSource === "route";
      const matchedItem = ctx?.matchedItem || null;
      const matchedSpec = ctx?.matchedSpec || null;

      return {
        user_id: CURRENT_USER?.id || null,
        email: CURRENT_USER?.email || null,
        source: ctx?.source || "text",
        raw_query: ctx?.rawQuery || null,
        normalized_query: ctx?.normalizedQuery || null,

        make_id: SELECTED_MAKE_ID || null,

        model_id: CURRENT_MODEL_ID || null,
        model_label: currentModelLabel(),
        dataset_file: CURRENT_DATASET_FILE || null,
        route_llm_query: isRoute ? (ctx?.routeLlmQuery || null) : null,
        route_part_phrases: isRoute ? (Array.isArray(ctx?.routePartPhrases) ? ctx.routePartPhrases : []) : null,
        route_llm_query_confidence: isRoute ? ctx?.routeLlmQueryConfidence ?? null : null,
        route_part_phrases_confidence: isRoute ? ctx?.routePartPhrasesConfidence ?? null : null,
        route_overall_confidence: isRoute ? ctx?.routeOverallConfidence ?? null : null,
        vision_query: isVision ? (ctx?.visionQuery || null) : null,
        vision_confidence: isVision ? ctx?.visionConfidence ?? null : null,
        vision_warnings: isVision ? (Array.isArray(ctx?.visionWarnings) ? ctx.visionWarnings : []) : null,
        result_type: normalizeSearchResultType(ctx?.resultType || "no_match"),
        matched_item_id: matchedItem?.id || null,
        matched_item_name: matchedItem ? (itemDisplayName(matchedItem) || null) : null,
        matched_item_common_name: matchedItem ? (itemCommonName(matchedItem) || null) : null,
        matched_spec_id: matchedSpec ? (matchedSpec.topic_id || matchedSpec.id || null) : null,
        matched_spec_title: matchedSpec ? (matchedSpec.title || null) : null,
        candidate_count: Number.isFinite(Number(ctx?.candidateCount)) ? Number(ctx.candidateCount) : (candidates.length || null),
        best_score: best && Number.isFinite(Number(best.score)) ? Number(best.score) : null,
        score_gap: best && second ? Number(best.score - second.score) : (Number.isFinite(Number(ctx?.scoreGap)) ? Number(ctx.scoreGap) : null),
        search_consumed: !!ctx?.searchConsumed,
        search_count_after: getUsageValue(usage, "used"),
        search_limit: getUsageValue(usage, "limit"),
        account_plan: getUsageValue(usage, "account_plan") || getUsageValue(usage, "level"),
        account_status: getUsageValue(usage, "account_status"),
